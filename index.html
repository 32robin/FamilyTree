<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyTool - 전문 상담용 가계도 작성기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .canvas-container { border: 2px solid #e2e8f0; border-radius: 8px; background: white; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-indigo-900">FamilyTool <span class="text-lg font-normal text-gray-500">v1.0 (Academic Ver.)</span></h1>
                <p class="text-gray-600">심리학 연구 및 임상을 위한 표준 가계도 저작 도구</p>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadPNG()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">PNG 저장</button>
                <button onclick="clearCanvas()" class="bg-red-100 text-red-600 px-4 py-2 rounded hover:bg-red-200 transition">초기화</button>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6">
            <aside class="col-span-2 bg-white p-4 rounded-lg shadow-sm space-y-4">
                <h2 class="font-bold text-gray-700 border-b pb-2">기호 추가</h2>
                <div class="flex flex-col gap-2">
                    <button onclick="addPerson('male')" class="w-full text-left p-2 border rounded hover:bg-indigo-50">□ 남성 (Male)</button>
                    <button onclick="addPerson('female')" class="w-full text-left p-2 border rounded hover:bg-indigo-50">○ 여성 (Female)</button>
                    <button onclick="addPerson('ip')" class="w-full text-left p-2 border-2 border-indigo-600 rounded bg-indigo-50">▣ 지표 내담자 (IP)</button>
                </div>
                
                <h2 class="font-bold text-gray-700 border-b pb-2 pt-4">관계 선</h2>
                <div class="flex flex-col gap-2">
                    <button onclick="startDrawingLine('solid')" class="w-full text-left p-2 border rounded hover:bg-gray-50">─ 결혼 (Marriage)</button>
                    <button onclick="startDrawingLine('dashed')" class="w-full text-left p-2 border rounded hover:bg-gray-50">--- 소원 (Distant)</button>
                    <button onclick="addText()" class="w-full text-left p-2 border rounded bg-yellow-50">T 텍스트 추가</button>
                </div>
                <div class="text-xs text-gray-400 mt-10 italic text-center">
                    Developed for <br>Byungsu Kim, PhD Student
                </div>
            </aside>

            <main class="col-span-10">
                <div class="canvas-container shadow-inner">
                    <canvas id="genogramCanvas" width="1000" height="650"></canvas>
                </div>
                <div class="mt-4 p-4 bg-indigo-50 rounded text-sm text-indigo-800">
                    <strong>사용 팁:</strong> 기호를 드래그하여 배치하세요. 'Delete' 키를 눌러 선택한 항목을 삭제할 수 있습니다. 텍스트를 더블클릭하여 이름/나이를 수정하세요.
                </div>
            </main>
        </div>
    </div>

    <script>
        const canvas = new fabric.Canvas('genogramCanvas', {
            backgroundColor: '#ffffff',
            selection: true
        });

        // 삭제 단축키
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                canvas.remove(...canvas.getActiveObjects());
                canvas.discardActiveObject().renderAll();
            }
        });

        // 인물 기호 추가
        function addPerson(type) {
            let shape;
            const commonProps = { left: 100, top: 100, stroke: 'black', strokeWidth: 2, fill: 'transparent' };

            if (type === 'male') {
                shape = new fabric.Rect({ ...commonProps, width: 50, height: 50 });
            } else if (type === 'female') {
                shape = new fabric.Circle({ ...commonProps, radius: 25 });
            } else if (type === 'ip') {
                // IP 기호 (이중 사각형)
                const outer = new fabric.Rect({ ...commonProps, width: 60, height: 60, strokeWidth: 2 });
                const inner = new fabric.Rect({ left: 105, top: 105, width: 50, height: 50, stroke: 'black', strokeWidth: 1, fill: 'transparent' });
                shape = new fabric.Group([outer, inner]);
            }

            const text = new fabric.IText('이름(나이)', {
                fontSize: 14,
                left: shape.left,
                top: shape.top + 65,
                textAlign: 'center'
            });

            const group = new fabric.Group([shape, text], { left: 200, top: 200 });
            canvas.add(group);
        }

        // 관계선 그리기 (기본 직선)
        function startDrawingLine(mode) {
            const line = new fabric.Line([50, 50, 200, 50], {
                stroke: 'black',
                strokeWidth: mode === 'solid' ? 2 : 1,
                strokeDashArray: mode === 'dashed' ? [5, 5] : null,
                left: 300,
                top: 300
            });
            canvas.add(line);
        }

        function addText() {
            const text = new fabric.IText('설명 입력', { left: 400, top: 300, fontSize: 16 });
            canvas.add(text);
        }

        function clearCanvas() {
            if (confirm("모든 작업 내용을 삭제하시겠습니까?")) canvas.clear();
        }

        function downloadPNG() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0 });
            const link = document.createElement('a');
            link.download = 'FamilyTool_Genogram.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
