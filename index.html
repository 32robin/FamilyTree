<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyTool Simple v2.1 - 세련된 단순함</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { background-color: #f8fafc; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #canvas-container { box-shadow: inset 0 0 100px rgba(79, 70, 229, 0.03); background-color: #fff; border-radius: 48px; position: relative; }
        .floating-menu { position: absolute; display: none; gap: 8px; pointer-events: none; backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); }
        .menu-btn { pointer-events: auto; width: 36px; height: 36px; border-radius: 12px; background: white; color: #475569; border: 1px solid #e2e8f0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s; }
        .menu-btn:hover { background: #4f46e5; color: white; border-color: #4f46e5; transform: scale(1.1); }
        .menu-btn.delete:hover { background: #ef4444; border-color: #ef4444; }
        .start-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        /* 선택된 노드에 부드러운 네온 효과 */
        .glow-selection { filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.7)); }
    </style>
</head>
<body class="p-6 flex flex-col h-screen">

    <header class="flex justify-between items-center mb-8 px-4">
        <h1 class="text-2xl font-black text-slate-800 tracking-tighter">FamilyTool <span class="font-extralight text-slate-400">Simple v2.1</span></h1>
        <div class="flex gap-3">
            <button onclick="downloadImage()" class="px-6 py-2.5 bg-white border border-slate-200 rounded-full text-sm font-bold text-slate-600 hover:bg-slate-50 transition shadow-sm">저장 (PNG)</button>
            <button onclick="location.reload()" class="px-6 py-2.5 bg-slate-900 text-white rounded-full text-sm font-bold hover:bg-black transition shadow-sm">새로 만들기</button>
        </div>
    </header>

    <div id="canvas-container" class="relative flex-grow border border-slate-100 overflow-hidden shadow-2xl">
        <canvas id="c"></canvas>
        
        <div id="start-screen" class="start-overlay p-10 bg-white/80 backdrop-blur-sm rounded-3xl border border-white shadow-xl">
            <button onclick="initIP()" class="px-10 py-5 bg-indigo-600 text-white rounded-full text-xl font-black shadow-lg hover:bg-indigo-700 transition-all transform hover:-translate-y-1">
                나(IP)부터 시작하기
            </button>
            <p class="mt-5 text-slate-500 text-sm font-medium">상담용 간단 가계도를 즉시 시작하세요.</p>
        </div>

        <div id="node-menu" class="floating-menu flex flex-col">
            <div class="flex gap-2">
                <button title="부모 추가" onclick="addRelative('parent')" class="menu-btn">↑</button>
                <button title="배우자 추가" onclick="addRelative('spouse')" class="menu-btn">→</button>
                <button title="자녀 추가" onclick="addRelative('child')" class="menu-btn">↓</button>
            </div>
            <div class="flex gap-2 mt-1 justify-center">
                <button title="성별 변경" onclick="toggleGender()" class="menu-btn text-xs font-bold">♂/♀</button>
                <button title="삭제" onclick="deleteNode()" class="menu-btn delete bg-red-50 text-red-500 border-red-100">✕</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const canvas = new fabric.Canvas('c', {
            width: container.clientWidth,
            height: container.clientHeight,
            selection: false
        });
        const menu = document.getElementById('node-menu');
        let activeNode = null;

        // 1. IP 생성 (최초 시작)
        function initIP() {
            document.getElementById('start-screen').style.display = 'none';
            // 화면 중앙에 IP 생성
            createPerson(canvas.width / 2, canvas.height / 2, '나(IP)', 'male', true);
        }

        // 2. 인물 노드 생성 함수 (디자인 고도화)
        function createPerson(x, y, label, gender, isIP = false) {
            const props = { stroke: '#475569', strokeWidth: 3, fill: 'white', originX: 'center', originY: 'center' };
            let shape;
            
            if (gender === 'male') {
                shape = new fabric.Rect({ ...props, width: 55, height: 55 });
            } else {
                shape = new fabric.Circle({ ...props, radius: 27.5 });
            }

            // IP 이중 기호 (정교한 둥근 사각형/원형)
            if (isIP) {
                const inner = (gender === 'male')
                    ? new fabric.Rect({ ...props, width: 45, height: 45, strokeWidth: 1.5 })
                    : new fabric.Circle({ ...props, radius: 22.5, strokeWidth: 1.5 });
                shape = new fabric.Group([shape, inner], { originX: 'center', originY: 'center' });
            }

            // 텍스트 디자인 (더 짙은 색)
            const text = new fabric.IText(label, {
                fontSize: 14,
                fontWeight: 'bold',
                top: 48,
                left: 0,
                originX: 'center',
                fill: '#1e293b'
            });

            const group = new fabric.Group([shape, text], {
                left: x,
                top: y,
                originX: 'center',
                originY: 'center',
                hasControls: false,
                hasBorders: false,
                data: { gender, isIP }
            });

            canvas.add(group);
            return group;
        }

        // 3. 관계 추가 로직 (클릭한 방향에 따라 자동 생성 및 연결)
        function addRelative(relType) {
            if (!activeNode) return;
            
            const offset = 180; // 간격 조금 더 넓힘
            let nx = activeNode.left;
            let ny = activeNode.top;
            let nGender = activeNode.data.gender === 'male' ? 'female' : 'male';
            let nLabel = '';

            if (relType === 'parent') { ny -= offset; nLabel = '부모'; nGender = 'female'; }
            else if (relType === 'spouse') { nx += offset; nLabel = '배우자'; }
            else if (relType === 'child') { ny += offset; nLabel = '자녀'; }

            const newNode = createPerson(nx, ny, nLabel, nGender);
            
            // 세련된 선 연결 (Slate Gray)
            const line = new fabric.Line([activeNode.left, activeNode.top, nx, ny], {
                stroke: '#cbd5e1',
                strokeWidth: 2,
                selectable: false,
                evented: false
            });
            canvas.add(line);
            line.sendToBack();
            
            hideMenu();
        }

        // 4. 성별 변경 토글 기능
        function toggleGender() {
            if (!activeNode) return;
            const data = activeNode.data;
            const newGender = data.gender === 'male' ? 'female' : 'male';
            const label = activeNode.item(1).text; // 기존 이름 유지
            const isIP = data.isIP;
            const { left, top } = activeNode;

            canvas.remove(activeNode);
            const newNode = createPerson(left, top, label, newGender, isIP);
            canvas.setActiveObject(newNode);
            hideMenu(); // 메뉴 위치 갱신을 위해 닫기
        }

        // 5. 노드 클릭 이벤트 및 메뉴 표시
        canvas.on('mouse:down', function(options) {
            if (options.target && options.target.type === 'group') {
                activeNode = options.target;
                
                // 선택된 노드에 시각적 효과 (임시: 캔버스 외곽선으로 표시)
                // 실제 DOM 필터는 캔버스 밖 메뉴에 적용
                const zoom = canvas.getZoom();
                
                menu.style.display = 'flex';
                menu.style.left = (activeNode.left * zoom - 60) + 'px'; // 중앙 정렬
                menu.style.top = (activeNode.top * zoom + 50) + 'px'; // 아래에 표시
                
            } else {
                hideMenu();
            }
        });

        function hideMenu() {
            menu.style.display = 'none';
            activeNode = null;
        }

        function deleteNode() {
            if (activeNode) {
                canvas.remove(activeNode);
                hideMenu();
            }
        }

        function downloadImage() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            const link = document.createElement('a');
            link.download = 'Genogram_Modern Simple.png';
            link.href = dataURL;
            link.click();
        }

        // 창 크기 조절 대응
        window.addEventListener('resize', () => {
            canvas.setWidth(container.clientWidth);
            canvas.setHeight(container.clientHeight);
            canvas.renderAll();
        });
    </script>
</body>
</html>
