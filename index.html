<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GenoPro Clinical — Generation Managed System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --sidebar-w: 570px; /* 기존 1.5배 확장 */
            --border: #e2e8f0;
            --accent: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: #1e293b;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR (확장된 입력 영역) ── */
        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: #ffffff;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 15px rgba(0,0,0,0.02);
            z-index: 20;
        }

        #sidebar-header { padding: 30px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: #64748b; font-size: 13px; font-weight: 400; margin-left: 10px; }

        #sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            scrollbar-width: thin;
        }

        /* ── UI COMPONENTS ── */
        .gen-section { 
            margin-bottom: 25px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            background: #fff;
        }
        .gen-header { 
            padding: 14px 20px; 
            background: #f1f5f9; 
            font-weight: 700; 
            font-size: 14px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .gen-body { padding: 20px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; font-weight: 600; color: #64748b; }
        
        input, select { 
            padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; transition: all 0.2s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-add { padding: 6px 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .member-item { background: #f8fafc; border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 10px; position: relative; }
        .btn-del { position: absolute; top: 10px; right: 10px; color: #ef4444; border: none; background: none; cursor: pointer; font-weight: bold; }

        /* ── PREVIEW (축소된 결과 페이지) ── */
        #preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #cbd5e1;
            overflow: hidden;
        }

        .canvas-wrapper {
            /* A4 비율 유지하면서 화면에 맞게 축소 */
            transform: scale(0.65); 
            transform-origin: center center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        #export-panel { padding: 25px; border-top: 1px solid var(--border); background: #fff; }
        .btn-save { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div id="sidebar-header">
        <div class="logo">GenoPro <span>Clinical Analysis System</span></div>
    </div>
    
    <div id="sidebar-content">
        <div class="gen-section">
            <div class="gen-header">4세대 (Great-Grandparents) <input type="checkbox" id="show-g-gp" onchange="update()"></div>
            <div class="gen-body" id="g-gp-fields" style="display:none">
                <p style="font-size:12px; color:#64748b; margin-bottom:10px;">증조부모 정보는 필요한 경우에만 활성화하십시오.</p>
                <div class="grid-2">
                    <div class="field"><label>증조부 성함</label><input type="text" id="ggf-info" oninput="update()"></div>
                    <div class="field"><label>증조모 성함</label><input type="text" id="ggm-info" oninput="update()"></div>
                </div>
            </div>
        </div>

        <div class="gen-section">
            <div class="gen-header">3세대 (Grandparents) <input type="checkbox" id="show-gp" onchange="update()" checked></div>
            <div class="gen-body">
                <div class="grid-2">
                    <div class="field"><label>친조부</label><input type="text" id="pgf-info" oninput="update()" placeholder="이름/생년"></div>
                    <div class="field"><label>친조모</label><input type="text" id="pgm-info" oninput="update()" placeholder="이름/생년"></div>
                </div>
            </div>
        </div>

        <div class="gen-section">
            <div class="gen-header">2세대 (Parents)</div>
            <div class="gen-body">
                <div class="grid-2">
                    <div class="field"><label>부(Father)</label><input type="text" id="fa-info" oninput="update()" value="아버님"></div>
                    <div class="field"><label>모(Mother)</label><input type="text" id="mo-info" oninput="update()" value="어머님"></div>
                </div>
                <div class="field">
                    <label>부부 관계 유형</label>
                    <select id="p-rel" onchange="update()">
                        <option value="married">기혼(실선)</option>
                        <option value="divorced">이혼(이중사선)</option>
                        <option value="separated">별거(사선)</option>
                        <option value="foster">양부모/위탁(점선)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="gen-section">
            <div class="gen-header">
                1세대 (IP & Siblings)
                <button class="btn-add" onclick="addSibling()">형제 추가</button>
            </div>
            <div class="gen-body">
                <div class="member-item" style="border-left: 4px solid #000;">
                    <label>내담자 (IP) 설정</label>
                    <div class="grid-2" style="margin-top:10px;">
                        <select id="ip-gender" onchange="update()">
                            <option value="female">여성(○)</option>
                            <option value="male">남성(□)</option>
                        </select>
                        <input type="text" id="ip-info" placeholder="이름/나이" oninput="update()">
                    </div>
                </div>
                <div id="sibling-list"></div>
            </div>
        </div>
    </div>

    <div id="export-panel">
        <button class="btn-save" onclick="saveImage()">보고서용 고해상도 저장 (A4)</button>
    </div>
</aside>

<main id="preview-area">
    <div class="canvas-wrapper">
        <canvas id="c"></canvas>
    </div>
</main>

<script>
    const A4_W = 1123;
    const A4_H = 794;
    const canvas = new fabric.Canvas('c', { width: A4_W, height: A4_H, backgroundColor: '#fff' });

    // 세대별 고정 Y 좌표 (보이지 않는 가이드라인)
    const Y_GEN4 = 100;
    const Y_GEN3 = 280;
    const Y_GEN2 = 460;
    const Y_GEN1 = 640;

    let siblings = [];

    function addSibling() {
        siblings.push({ id: Date.now(), gender: 'male', info: '' });
        renderSiblings();
        update();
    }

    function renderSiblings() {
        const container = document.getElementById('sibling-list');
        container.innerHTML = siblings.map(s => `
            <div class="member-item">
                <button class="btn-del" onclick="removeSib(${s.id})">×</button>
                <div class="grid-2">
                    <select onchange="updateSib(${s.id}, 'gender', this.value)">
                        <option value="male" ${s.gender==='male'?'selected':''}>남성</option>
                        <option value="female" ${s.gender==='female'?'selected':''}>여성</option>
                    </select>
                    <input type="text" value="${s.info}" oninput="updateSib(${s.id}, 'info', this.value)" placeholder="정보">
                </div>
            </div>
        `).join('');
    }

    function updateSib(id, k, v) {
        const s = siblings.find(x => x.id === id);
        if(s) s[k] = v;
        update();
    }

    function removeSib(id) {
        siblings = siblings.filter(x => x.id !== id);
        renderSiblings();
        update();
    }

    function drawNode(x, y, gender, label, isIP = false) {
        const radius = 32;
        const common = { left: x-radius, top: y-radius, fill: 'transparent', stroke: '#000', strokeWidth: 1.5 };
        
        const shape = gender === 'male' 
            ? new fabric.Rect({...common, width: radius*2, height: radius*2})
            : new fabric.Circle({...common, radius: radius});
        canvas.add(shape);

        if(isIP) {
            const gap = 6;
            const ipCommon = { left: x-radius+gap, top: y-radius+gap, fill: 'transparent', stroke: '#000', strokeWidth: 1 };
            const inner = gender === 'male'
                ? new fabric.Rect({...ipCommon, width: (radius-gap)*2, height: (radius-gap)*2})
                : new fabric.Circle({...ipCommon, radius: radius-gap});
            canvas.add(inner);
        }

        if(label) {
            canvas.add(new fabric.Text(label, {
                left: x, top: y + radius + 10, fontSize: 13, textAlign: 'center', originX: 'center', fontFamily: 'Noto Sans KR'
            }));
        }
    }

    function drawConnect(x1, y1, x2, y2, mode = 'solid') {
        canvas.add(new fabric.Line([x1, y1, x2, y2], {
            stroke: '#000', strokeWidth: 1.2,
            strokeDashArray: mode === 'foster' ? [5, 5] : null
        }));
    }

    function update() {
        canvas.clear();
        canvas.setBackgroundColor('#fff', canvas.renderAll.bind(canvas));
        
        const mid = A4_W / 2;
        document.getElementById('g-gp-fields').style.display = document.getElementById('show-g-gp').checked ? 'block' : 'none';

        // 4세대 (증조)
        if(document.getElementById('show-g-gp').checked) {
            drawNode(mid-80, Y_GEN4, 'male', document.getElementById('ggf-info').value);
            drawNode(mid+80, Y_GEN4, 'female', document.getElementById('ggm-info').value);
            drawConnect(mid-48, Y_GEN4, mid+48, Y_GEN4);
        }

        // 3세대 (조부)
        if(document.getElementById('show-gp').checked) {
            drawNode(mid-120, Y_GEN3, 'male', document.getElementById('pgf-info').value);
            drawNode(mid+120, Y_GEN3, 'female', document.getElementById('pgm-info').value);
            drawConnect(mid-88, Y_GEN3, mid+88, Y_GEN3);
        }

        // 2세대 (부모)
        const faX = mid-150, moX = mid+150;
        const rel = document.getElementById('p-rel').value;
        drawNode(faX, Y_GEN2, 'male', document.getElementById('fa-info').value);
        drawNode(moX, Y_GEN2, 'female', document.getElementById('mo-info').value);
        drawConnect(faX+32, Y_GEN2, moX-32, Y_GEN2, rel);
        
        // 이혼/별거 표시
        if(rel === 'divorced' || rel === 'separated') {
            const mx = mid;
            drawConnect(mx-8, Y_GEN2-12, mx+8, Y_GEN2+12);
            if(rel === 'divorced') drawConnect(mx, Y_GEN2-12, mx+16, Y_GEN2+12);
        }

        // 1세대 (IP 및 형제)
        const ipX = mid;
        drawNode(ipX, Y_GEN1, document.getElementById('ip-gender').value, document.getElementById('ip-info').value, true);
        
        // 수직 계보선 (세대 구분)
        drawConnect(mid, Y_GEN2, mid, Y_GEN1-32-30); // 부모 -> 자녀 기준점
        drawConnect(mid, Y_GEN1-32-30, ipX, Y_GEN1-32);

        siblings.forEach((s, i) => {
            const sx = ipX + (140 * (i + 1));
            drawNode(sx, Y_GEN1, s.gender, s.info);
            drawConnect(mid, Y_GEN1-62, sx, Y_GEN1-62);
            drawConnect(sx, Y_GEN1-62, sx, Y_GEN1-32);
        });

        canvas.renderAll();
    }

    function saveImage() {
        const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 });
        const link = document.createElement('a');
        link.download = `Genogram_A4_Report.png`;
        link.href = dataURL;
        link.click();
    }

    update();
</script>
</body>
</html>
