<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GenoPro Professional — 가계도 작성 도구(충북대 심리학과 김병수 제작)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-bg: #f5f7fa;
            --sidebar-bg: #ffffff;
            --border-color: #d1d5db;
            --accent-color: #2563eb;
            --text-main: #1f2937;
            --paper-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--ui-bg);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 사이드바 UI - 전문가적이고 차분한 톤 */
        #sidebar {
            width: 360px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        #sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 18px; font-weight: 700; color: var(--text-main); }
        
        #sidebar-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        /* 섹션 스타일링 */
        .section { margin-bottom: 16px; border: 1px solid var(--border-color); border-radius: 8px; }
        .section-header { padding: 12px; background: #f9fafb; cursor: pointer; font-weight: 700; font-size: 13px; border-bottom: 1px solid var(--border-color); }
        .section-body { padding: 15px; }

        .field-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 4px; font-weight: 700; }
        input, select { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; }

        /* 캔버스 영역 - A4 가로 규격 시뮬레이션 */
        #main-view {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: auto;
        }

        .paper-container {
            background: var(--paper-bg);
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            position: relative;
            /* A4 가로 비율 유지 */
            width: 1123px; 
            height: 794px;
            min-width: 1123px;
            min-height: 794px;
        }

        #export-bar { padding: 20px; border-top: 1px solid var(--border-color); }
        .btn { width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 700; border: none; }
        .btn-primary { background: var(--text-main); color: white; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div id="sidebar-header">
        <div class="logo">GenoPro <span style="font-weight:400; font-size: 12px; color: #6b7280;">Professional v2.0</span></div>
    </div>
    <div id="sidebar-content">
        <div class="section">
            <div class="section-header">내담자 정보 (IP)</div>
            <div class="section-body">
                <div class="field-group">
                    <label>성별</label>
                    <select id="ip-gender" onchange="render()">
                        <option value="male">남성 (□)</option>
                        <option value="female" selected>여성 (○)</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>이름/나이/연도</label>
                    <input type="text" id="ip-info" placeholder="홍길동 (32) 1994" oninput="render()">
                </div>
            </div>
        </div>
        </div>
    <div id="export-bar">
        <button class="btn btn-primary" onclick="downloadPNG()">보고서용 PNG 저장</button>
    </div>
</aside>

<main id="main-view">
    <div class="paper-container">
        <canvas id="c"></canvas>
    </div>
</main>

<script>
    // 가로 A4 해상도 (96 DPI 기준)
    const A4_WIDTH = 1123;
    const A4_HEIGHT = 794;

    const canvas = new fabric.Canvas('c', {
        width: A4_WIDTH,
        height: A4_HEIGHT,
        backgroundColor: '#ffffff',
        selection: true
    });

    const STROKE_COLOR = '#000000'; // 무조건 검정색
    const NODE_SIZE = 40;

    function render() {
        canvas.clear();
        canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));

        const ipGender = document.getElementById('ip-gender').value;
        const ipInfo = document.getElementById('ip-info').value;

        drawPerson(A4_WIDTH/2, A4_HEIGHT/2 + 50, ipGender, ipInfo, true);
        
        // 여기에 부모, 자녀 등 추가 로직 배치
        drawGuidelines();
        canvas.renderAll();
    }

    function drawPerson(x, y, gender, label, isIP = false) {
        const strokeWidth = 1.5;
        let shape;

        if (gender === 'male') {
            shape = new fabric.Rect({
                left: x - NODE_SIZE, top: y - NODE_SIZE,
                width: NODE_SIZE * 2, height: NODE_SIZE * 2,
                fill: 'transparent', stroke: STROKE_COLOR, strokeWidth: strokeWidth
            });
        } else {
            shape = new fabric.Circle({
                left: x - NODE_SIZE, top: y - NODE_SIZE,
                radius: NODE_SIZE,
                fill: 'transparent', stroke: STROKE_COLOR, strokeWidth: strokeWidth
            });
        }

        canvas.add(shape);

        // 내담자(IP)는 이중선 처리 (표준 가계도 표기법)
        if (isIP) {
            const innerSize = 8;
            let innerShape;
            if (gender === 'male') {
                innerShape = new fabric.Rect({
                    left: x - NODE_SIZE + innerSize, top: y - NODE_SIZE + innerSize,
                    width: (NODE_SIZE - innerSize) * 2, height: (NODE_SIZE - innerSize) * 2,
                    fill: 'transparent', stroke: STROKE_COLOR, strokeWidth: 1
                });
            } else {
                innerShape = new fabric.Circle({
                    left: x - NODE_SIZE + innerSize, top: y - NODE_SIZE + innerSize,
                    radius: NODE_SIZE - innerSize,
                    fill: 'transparent', stroke: STROKE_COLOR, strokeWidth: 1
                });
            }
            canvas.add(innerShape);
        }

        if (label) {
            const text = new fabric.Text(label, {
                left: x, top: y + NODE_SIZE + 10,
                fontSize: 14, textAlign: 'center', originX: 'center',
                fontFamily: 'Noto Sans KR'
            });
            canvas.add(text);
        }
    }

    function drawGuidelines() {
        // 보고서 작성 편의를 위한 세대 가이드라인 (선택사항)
        const text = new fabric.Text("가계도(Genogram)", {
            left: 40, top: 40, fontSize: 20, fontWeight: 'bold'
        });
        canvas.add(text);
    }

    function downloadPNG() {
        const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 });
        const link = document.createElement('a');
        link.download = `genogram_report_${new Date().getTime()}.png`;
        link.href = dataURL;
        link.click();
    }

    render();
</script>
</body>
</html>
